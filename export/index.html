<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prompt Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .prose pre { background-color: #f4f4f5; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    .dark .prose pre { background-color: #18181b; }
    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.2s ease-out forwards; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-200 overflow-hidden selection:bg-indigo-500/30 font-sans">
  <div class="flex h-screen w-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-zinc-50 dark:bg-zinc-950 flex flex-col transform transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 -translate-x-full">
      <div class="p-6 flex items-center justify-between h-[88px]">
        <h2 class="text-xl font-medium text-zinc-900 dark:text-zinc-100 pl-2">Categories</h2>
        <button id="close-sidebar" class="lg:hidden p-2 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 rounded-full hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <div id="sidebar-nav" class="px-4 pb-4 space-y-1 overflow-y-auto flex-1"></div>
      <div class="p-4 border-t border-zinc-200 dark:border-zinc-800/50 flex flex-col gap-1">
        <button id="nav-deleted" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-full text-sm font-medium transition-colors text-zinc-500 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 hover:text-red-300">
          <i data-lucide="trash-2" class="w-[18px] h-[18px]"></i> Deleted
        </button>
        <button id="nav-settings" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-full text-sm font-medium transition-colors text-zinc-500 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 hover:text-zinc-800 dark:hover:text-zinc-200">
          <i data-lucide="settings" class="w-[18px] h-[18px]"></i> Settings
        </button>
      </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-zinc-50/60 dark:bg-zinc-950/60 z-30 lg:hidden backdrop-blur-sm transition-opacity hidden"></div>

    <!-- List View -->
    <div id="list-view" class="flex-col w-full md:w-80 lg:w-96 bg-zinc-50 dark:bg-zinc-950 flex">
      <div class="p-4 flex flex-col gap-4">
        <div class="flex items-center justify-between h-14 px-2">
          <div class="flex items-center gap-3">
            <button id="open-sidebar" class="lg:hidden p-2 -ml-2 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 rounded-full hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors">
              <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <h1 id="header-text" class="text-2xl font-medium text-zinc-900 dark:text-zinc-100 tracking-tight truncate max-w-[200px] sm:max-w-[300px]">Prompt Vault</h1>
          </div>
          <div class="flex items-center gap-2">
            <button id="btn-empty-trash" class="hidden p-3.5 bg-red-900/30 hover:bg-red-900/50 text-red-300 rounded-full transition-colors active:scale-95 shadow-sm" title="Empty Trash">
              <i data-lucide="trash-2" class="w-[22px] h-[22px] stroke-[2.5]"></i>
            </button>
            <button id="btn-add-prompt" class="p-3.5 bg-indigo-200 hover:bg-indigo-300 text-indigo-950 rounded-full transition-colors active:scale-95 shadow-sm" title="Add new prompt">
              <i data-lucide="plus" class="w-[22px] h-[22px] stroke-[2.5]"></i>
            </button>
          </div>
        </div>
        <div class="flex gap-2 px-2">
          <div class="relative flex-1">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500 w-5 h-5"></i>
            <input type="text" id="search-input" placeholder="Search prompts..." class="w-full bg-white dark:bg-zinc-900 rounded-full py-3.5 pl-11 pr-4 text-base focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all placeholder:text-zinc-400 dark:text-zinc-500 text-zinc-800 dark:text-zinc-200">
          </div>
          <div class="relative">
            <button id="btn-sort" class="flex items-center justify-center w-[52px] h-[52px] bg-white dark:bg-zinc-900 text-zinc-700 dark:text-zinc-300 rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all border border-transparent hover:border-zinc-300 dark:border-zinc-700">
              <i data-lucide="arrow-up-down" class="w-5 h-5 text-zinc-500 dark:text-zinc-400"></i>
            </button>
            <div id="sort-menu" class="hidden absolute right-0 top-full mt-2 w-48 bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-2xl shadow-xl z-20 overflow-hidden py-1 animate-zoom-in">
              <!-- Sort options populated by JS -->
            </div>
          </div>
        </div>
      </div>
      <div id="prompt-list" class="flex-1 overflow-y-auto px-4 pb-4 space-y-3 select-none overflow-x-hidden"></div>
    </div>

    <!-- Detail View -->
    <div id="detail-view" class="flex-1 flex-col bg-zinc-50 dark:bg-zinc-950 md:rounded-l-[2.5rem] md:my-2 md:mr-2 overflow-hidden hidden md:flex">
      <div id="detail-empty" class="flex-1 flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 p-8 text-center select-none">
        <div class="w-20 h-20 rounded-full bg-zinc-100/50 dark:bg-zinc-800/50 flex items-center justify-center mb-6">
          <i data-lucide="copy" class="w-8 h-8 text-zinc-500 dark:text-zinc-400"></i>
        </div>
        <h2 class="text-2xl font-medium text-zinc-700 dark:text-zinc-300 mb-3">No Prompt Selected</h2>
        <p class="max-w-sm text-base text-zinc-400 dark:text-zinc-500">Select a prompt from the sidebar or create a new one to get started.</p>
      </div>
      <div id="detail-content" class="hidden flex-col h-full">
        <div class="flex items-center justify-between p-4 sm:p-6 md:px-8 h-[88px]">
          <div class="flex items-center gap-4">
            <button id="btn-back-list" class="md:hidden p-2 -ml-2 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
              <i data-lucide="chevron-left" class="w-7 h-7"></i>
            </button>
            <h2 id="detail-title" class="text-2xl font-medium text-zinc-900 dark:text-zinc-100 truncate pr-4"></h2>
          </div>
          <div id="detail-actions" class="flex items-center gap-2"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 md:px-8 pb-12">
          <div class="max-w-4xl mx-auto">
            <div id="detail-tags" class="flex flex-wrap gap-2 mb-8 hidden"></div>
            <div class="bg-transparent rounded-[2rem] p-6 sm:p-8 md:p-10">
              <div id="detail-body" class="prose dark:prose-invert prose-zinc max-w-none prose-p:leading-relaxed prose-pre:bg-white dark:prose-pre:bg-zinc-900 prose-pre:border prose-pre:border-zinc-200 dark:prose-pre:border-zinc-800 select-text"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Modals Container -->
  <div id="modals-container"></div>
  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 hidden animate-slide-up">
    <div class="bg-zinc-900 dark:bg-zinc-800 text-zinc-100 dark:text-zinc-200 px-5 py-3.5 rounded-full shadow-lg flex items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-500/20 p-1.5 rounded-full">
          <i data-lucide="check" class="w-[18px] h-[18px] text-indigo-400 dark:text-indigo-300"></i>
        </div>
        <span id="toast-message" class="text-sm font-medium"></span>
      </div>
      <div id="toast-action-container" class="hidden items-center gap-4">
        <div class="w-px h-4 bg-zinc-700"></div>
        <button id="toast-action-btn" class="text-sm font-bold bg-indigo-500/20 text-indigo-400 dark:text-indigo-300 hover:bg-indigo-500/30 px-3 py-1.5 rounded-md uppercase tracking-wide transition-colors"></button>
      </div>
    </div>
  </div>
  <script>
    // State
    let prompts = JSON.parse(localStorage.getItem('prompt_vault_data')) || [
      {
        id: '1',
        title: 'Example: Code Review Expert',
        body: 'Act as an expert software engineer. Review the following code for performance, security, and readability issues. Provide actionable feedback and refactored code snippets.',
        tags: ['Code', 'Review'],
        createdAt: Date.now(),
      }
    ];
    let selectedId = null;
    let searchQuery = '';
    let sortOption = 'created-desc';
    let isSortMenuOpen = false;
    let viewMode = 'all';
    let selectedTags = [];
    let isSidebarOpen = false;
    let history = JSON.parse(localStorage.getItem('prompt_vault_history')) || [];
    let isDarkMode = localStorage.getItem('prompt_vault_theme') ? localStorage.getItem('prompt_vault_theme') === 'dark' : true;
    let appSettings = JSON.parse(localStorage.getItem('prompt_vault_settings')) || { autoCloseOnCopy: false, includeTitleOnCopy: false };
    
    let editingPrompt = null;
    let modalTags = [];
    let isPreviewMode = false;
    let promptToDelete = null;
    let isDirty = false;

    // Utils
    const savePrompts = () => localStorage.setItem('prompt_vault_data', JSON.stringify(prompts));
    const saveHistory = () => localStorage.setItem('prompt_vault_history', JSON.stringify(history));
    const saveSettings = () => localStorage.setItem('prompt_vault_settings', JSON.stringify(appSettings));
    
    const applyTheme = () => {
      if (isDarkMode) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('prompt_vault_theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('prompt_vault_theme', 'light');
      }
    };
    applyTheme();

    const showToast = (message, action = null) => {
      const container = document.getElementById('toast-container');
      document.getElementById('toast-message').textContent = message;
      const actionContainer = document.getElementById('toast-action-container');
      const actionBtn = document.getElementById('toast-action-btn');
      
      if (action) {
        actionContainer.classList.remove('hidden');
        actionContainer.classList.add('flex');
        actionBtn.textContent = action.label;
        actionBtn.onclick = () => { action.onClick(); container.classList.add('hidden'); };
      } else {
        actionContainer.classList.add('hidden');
        actionContainer.classList.remove('flex');
      }
      
      container.classList.remove('hidden');
      setTimeout(() => container.classList.add('hidden'), 4000);
    };

    const handleSelectPrompt = (id) => {
      selectedId = id;
      if (id) {
        prompts = prompts.map(p => p.id === id ? { ...p, lastAccessedAt: Date.now() } : p);
        savePrompts();
        history = history.filter(hId => hId !== id);
        history.unshift(id);
        history = history.slice(0, 50);
        saveHistory();
      }
      renderApp();
    };

    const handleCopy = async (prompt) => {
      try {
        const textToCopy = appSettings.includeTitleOnCopy ? `${prompt.title}\n\n${prompt.body}` : prompt.body;
        await navigator.clipboard.writeText(textToCopy);
        showToast('Copied to Clipboard!');
        if (appSettings.autoCloseOnCopy) handleSelectPrompt(null);
      } catch (err) {
        showToast('Failed to copy');
      }
    };

    const escapeCSV = (str) => {
      if (str == null) return '';
      const s = String(str);
      if (/[,"\n\r]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
      return s;
    };

    const parseCSV = (text) => {
      const rows = [];
      let currentRow = [];
      let currentCell = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];
        if (inQuotes) {
          if (char === '"' && nextChar === '"') { currentCell += '"'; i++; }
          else if (char === '"') inQuotes = false;
          else currentCell += char;
        } else {
          if (char === '"') inQuotes = true;
          else if (char === ',') { currentRow.push(currentCell); currentCell = ''; }
          else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
            currentRow.push(currentCell); rows.push(currentRow); currentRow = []; currentCell = '';
            if (char === '\r') i++;
          } else currentCell += char;
        }
      }
      if (currentCell !== '' || currentRow.length > 0) { currentRow.push(currentCell); rows.push(currentRow); }
      return rows;
    };

    const renderWithVariables = (text) => {
      if (!text) return '';
      return text.replace(/(\[[^\]]+\])/g, '<span class="bg-yellow-900/30 text-yellow-200 px-1 rounded font-medium">$1</span>');
    };
    const renderSidebar = () => {
      const navContainer = document.getElementById('sidebar-nav');
      navContainer.innerHTML = '';
      
      const allBtn = document.createElement('button');
      allBtn.className = `w-full flex items-center justify-between px-4 py-3.5 rounded-full text-sm font-medium transition-colors ${viewMode === 'all' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/50'}`;
      allBtn.innerHTML = `<div class="flex items-center gap-4"><i data-lucide="layout-grid" class="w-[18px] h-[18px]"></i> All Prompts</div><span class="text-xs font-semibold bg-zinc-200/50 dark:bg-zinc-800 px-2 py-0.5 rounded-full">${prompts.filter(p => !p.isDeleted).length}</span>`;
      allBtn.onclick = () => { viewMode = 'all'; selectedTags = []; renderApp(); };
      navContainer.appendChild(allBtn);

      const recentBtn = document.createElement('button');
      recentBtn.className = `w-full flex items-center justify-between px-4 py-3.5 rounded-full text-sm font-medium transition-colors ${viewMode === 'recent' ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/50'}`;
      recentBtn.innerHTML = `<div class="flex items-center gap-4"><i data-lucide="clock" class="w-[18px] h-[18px]"></i> Recent</div><span class="text-xs font-semibold bg-zinc-200/50 dark:bg-zinc-800 px-2 py-0.5 rounded-full">${history.length}</span>`;
      recentBtn.onclick = () => { viewMode = 'recent'; selectedTags = []; renderApp(); };
      navContainer.appendChild(recentBtn);

      const tags = Array.from(new Set(prompts.filter(p => !p.isDeleted).flatMap(p => p.tags || []))).sort();
      if (tags.length > 0) {
        const tagsHeader = document.createElement('div');
        tagsHeader.className = 'px-4 py-3 mt-4 text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider';
        tagsHeader.textContent = 'Tags';
        navContainer.appendChild(tagsHeader);

        tags.forEach(tag => {
          const tagBtn = document.createElement('button');
          const isSelected = selectedTags.includes(tag);
          tagBtn.className = `w-full flex items-center justify-between px-4 py-3 rounded-full text-sm font-medium transition-colors ${isSelected ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300' : 'text-zinc-600 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/50'}`;
          tagBtn.innerHTML = `<div class="flex items-center gap-4"><i data-lucide="tag" class="w-[16px] h-[16px]"></i> ${tag}</div>`;
          tagBtn.onclick = () => {
            viewMode = 'tags';
            if (isSelected) selectedTags = selectedTags.filter(t => t !== tag);
            else selectedTags = [...selectedTags, tag];
            if (selectedTags.length === 0) viewMode = 'all';
            renderApp();
          };
          navContainer.appendChild(tagBtn);
        });
      }

      const deletedBtn = document.getElementById('nav-deleted');
      deletedBtn.className = `w-full flex items-center gap-4 px-4 py-3.5 rounded-full text-sm font-medium transition-colors ${viewMode === 'deleted' ? 'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400' : 'text-zinc-500 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-900 hover:text-red-300'}`;
      deletedBtn.onclick = () => { viewMode = 'deleted'; selectedTags = []; renderApp(); };
      
      lucide.createIcons();
    };
    const renderList = () => {
      const listContainer = document.getElementById('prompt-list');
      listContainer.innerHTML = '';
      
      let filtered = prompts;
      if (viewMode === 'deleted') {
        filtered = filtered.filter(p => p.isDeleted);
        document.getElementById('header-text').textContent = 'Recycle Bin';
        document.getElementById('btn-empty-trash').classList.remove('hidden');
        document.getElementById('btn-add-prompt').classList.add('hidden');
      } else {
        filtered = filtered.filter(p => !p.isDeleted);
        document.getElementById('header-text').textContent = 'Prompt Vault';
        document.getElementById('btn-empty-trash').classList.add('hidden');
        document.getElementById('btn-add-prompt').classList.remove('hidden');
        
        if (viewMode === 'recent') {
          filtered = history.map(id => filtered.find(p => p.id === id)).filter(Boolean);
        } else if (viewMode === 'tags' && selectedTags.length > 0) {
          filtered = filtered.filter(p => selectedTags.every(t => p.tags?.includes(t)));
        }
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.body.toLowerCase().includes(q) || p.tags?.some(t => t.toLowerCase().includes(q)));
      }

      if (viewMode !== 'recent') {
        filtered.sort((a, b) => {
          switch (sortOption) {
            case 'created-desc': return b.createdAt - a.createdAt;
            case 'created-asc': return a.createdAt - b.createdAt;
            case 'alpha-asc': return a.title.localeCompare(b.title);
            case 'alpha-desc': return b.title.localeCompare(a.title);
            default: return 0;
          }
        });
      }

      if (filtered.length === 0) {
        listContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-zinc-400 dark:text-zinc-500 p-8 text-center animate-fade-in"><div class="w-16 h-16 rounded-full bg-zinc-100 dark:bg-zinc-800/50 flex items-center justify-center mb-4"><i data-lucide="search-x" class="w-6 h-6"></i></div><p class="text-sm">No prompts found</p></div>`;
      } else {
        filtered.forEach(prompt => {
          const card = document.createElement('div');
          const isSelected = selectedId === prompt.id;
          card.className = `group relative overflow-hidden rounded-2xl cursor-pointer transition-all duration-200 border ${isSelected ? 'bg-white dark:bg-zinc-900 border-indigo-200 dark:border-indigo-500/30 shadow-sm ring-1 ring-indigo-500/10' : 'bg-transparent border-transparent hover:bg-white/60 dark:hover:bg-zinc-900/60 hover:border-zinc-200 dark:hover:border-zinc-800'}`;
          
          let contentHtml = `<div class="p-4 relative z-10 transition-transform duration-200" id="card-content-${prompt.id}">`;
          contentHtml += `<div class="flex justify-between items-start gap-4 mb-2"><h3 class="font-semibold text-zinc-900 dark:text-zinc-100 truncate flex-1">${prompt.title}</h3></div>`;
          contentHtml += `<p class="text-sm text-zinc-500 dark:text-zinc-400 line-clamp-2 mb-3 leading-relaxed">${prompt.body}</p>`;
          
          if (prompt.tags && prompt.tags.length > 0) {
            contentHtml += `<div class="flex flex-wrap gap-1.5 mt-auto">`;
            prompt.tags.slice(0, 3).forEach(tag => {
              contentHtml += `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-medium bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700">${tag}</span>`;
            });
            if (prompt.tags.length > 3) {
              contentHtml += `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-medium bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 border border-zinc-200 dark:border-zinc-700">+${prompt.tags.length - 3}</span>`;
            }
            contentHtml += `</div>`;
          }
          contentHtml += `</div>`;
          
          if (!prompt.isDeleted) {
            contentHtml += `<div class="absolute inset-y-0 right-0 w-24 bg-red-500 flex items-center justify-end pr-6 text-white opacity-0 transition-opacity duration-200" id="card-delete-${prompt.id}"><i data-lucide="trash-2" class="w-5 h-5"></i></div>`;
          }
          
          card.innerHTML = contentHtml;
          
          // Swipe logic
          if (!prompt.isDeleted) {
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            const contentDiv = card.querySelector(`#card-content-${prompt.id}`);
            const deleteDiv = card.querySelector(`#card-delete-${prompt.id}`);

            const handleStart = (e) => {
              startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
              isDragging = true;
              contentDiv.style.transition = 'none';
            };

            const handleMove = (e) => {
              if (!isDragging) return;
              const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
              currentX = x - startX;
              if (currentX < 0) {
                e.preventDefault();
                contentDiv.style.transform = `translateX(${Math.max(currentX, -80)}px)`;
                deleteDiv.style.opacity = Math.min(Math.abs(currentX) / 80, 1);
              }
            };

            const handleEnd = () => {
              if (!isDragging) return;
              isDragging = false;
              contentDiv.style.transition = 'transform 0.2s ease-out';
              if (currentX < -50) {
                contentDiv.style.transform = `translateX(-80px)`;
                promptToDelete = prompt;
                renderModals();
                setTimeout(() => {

              <h3 class="text-sm font-semibold text-zinc-900 dark:text-zinc-100 uppercase tracking-wider">Data Management</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button id="btn-export-csv" class="flex items-center justify-center gap-2 p-4 bg-zinc-50 dark:bg-zinc-800/50 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700/50 transition-colors text-zinc-700 dark:text-zinc-300 font-medium">
                  <i data-lucide="download" class="w-5 h-5"></i> Export CSV
                </button>
                <div class="relative">
                  <input type="file" id="import-csv-input" accept=".csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                  <button class="w-full flex items-center justify-center gap-2 p-4 bg-zinc-50 dark:bg-zinc-800/50 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-xl border border-zinc-200 dark:border-zinc-700/50 transition-colors text-zinc-700 dark:text-zinc-300 font-medium">
                    <i data-lucide="upload" class="w-5 h-5"></i> Import CSV
                  </button>
                </div>
              </div>
            </div>

            <div class="space-y-4 pt-4 border-t border-zinc-200 dark:border-zinc-800">
              <h3 class="text-sm font-semibold text-red-600 dark:text-red-400 uppercase tracking-wider">Danger Zone</h3>
              <div class="flex items-center justify-between p-4 bg-red-50 dark:bg-red-900/10 rounded-xl border border-red-200 dark:border-red-900/30">
                <div><p class="font-medium text-red-900 dark:text-red-200">Factory Reset</p><p class="text-sm text-red-700 dark:text-red-400">Delete all data and settings</p></div>
                <button id="btn-factory-reset" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm shadow-red-500/20">Reset App</button>
              </div>
            </div>

          </div>
        `;
        
        content.innerHTML = html;
        modal.appendChild(content);
        container.appendChild(modal);

        document.getElementById('btn-close-settings').onclick = () => { isSettingsModalOpen = false; renderApp(); };
        
        document.getElementById('toggle-dark-mode').onclick = () => {
          isDarkMode = !isDarkMode;
          applyTheme();
          renderSettingsModal();
        };

        document.getElementById('toggle-auto-close').onclick = () => {
          appSettings.autoCloseOnCopy = !appSettings.autoCloseOnCopy;
          saveSettings();
          renderSettingsModal();
        };

        document.getElementById('toggle-include-title').onclick = () => {
          appSettings.includeTitleOnCopy = !appSettings.includeTitleOnCopy;
          saveSettings();
          renderSettingsModal();
        };

        document.getElementById('btn-export-csv').onclick = () => {
          const headers = ['Title', 'Body', 'Tags', 'Created At'];
          const rows = prompts.map(p => [
            escapeCSV(p.title),
            escapeCSV(p.body),
            escapeCSV(p.tags?.join(', ')),
            escapeCSV(new Date(p.createdAt).toISOString())
          ]);
          const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement('a');
          const url = URL.createObjectURL(blob);
          link.setAttribute('href', url);
          link.setAttribute('download', `prompt_vault_export_${new Date().toISOString().split('T')[0]}.csv`);
          link.style.visibility = 'hidden';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast('Exported successfully');
        };

        document.getElementById('import-csv-input').onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const text = event.target.result;
              const rows = parseCSV(text);
              if (rows.length < 2) throw new Error('Invalid CSV format');
              
              const newPrompts = rows.slice(1).map(row => {
                if (row.length < 2) return null;
                return {
                  id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                  title: row[0] || 'Untitled',
                  body: row[1] || '',
                  tags: row[2] ? row[2].split(',').map(t => t.trim()).filter(Boolean) : [],
                  createdAt: row[3] ? new Date(row[3]).getTime() : Date.now(),
                  lastAccessedAt: Date.now()
                };
              }).filter(Boolean);

              if (newPrompts.length > 0) {
                prompts = [...newPrompts, ...prompts];
                savePrompts();
                showToast(`Imported ${newPrompts.length} prompts`);
                isSettingsModalOpen = false;
                renderApp();
              } else {
                throw new Error('No valid prompts found');
              }
            } catch (err) {
              alert('Failed to import CSV: ' + err.message);
            }
          };
          reader.readAsText(file);
        };

        document.getElementById('btn-factory-reset').onclick = () => {
          if (confirm('Are you absolutely sure? This will delete ALL prompts, history, and settings. This action cannot be undone.')) {
            localStorage.removeItem('prompt_vault_data');
            localStorage.removeItem('prompt_vault_history');
            localStorage.removeItem('prompt_vault_settings');
            localStorage.removeItem('prompt_vault_theme');
            window.location.reload();
          }
        };

        lucide.createIcons();
      };

      document.getElementById('nav-settings').onclick = () => {
        isSettingsModalOpen = true;
        renderSettingsModal();
      };
      
      // Initial render of settings modal if open (it shouldn't be on load, but just in case)
      if (isSettingsModalOpen) renderSettingsModal();
    });
  </script>
</body>
</html>
